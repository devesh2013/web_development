<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>array operations in javascript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>array operations in javascript</h1>
    <p id="output"></p>
    <button type="button" class="btn btn-primary" onclick="ascend()">sort the array(ascending)</button>
    <button type="button" class="btn btn-secondary" onclick="descend()">sort the array(descending)</button>
    
    <script>
        let arr = [4, 6, 7, 5, 3, 9, 8, 13, 67, 56, 45, 24, 35, 25, 37, 69]
        document.getElementById("output").innerHTML = arr
        function ascend() {
            arr.sort(function (n1, n2) {
                return n1 - n2
            })
            document.getElementById("output").innerHTML = arr
        }
        function descend() {
            arr.sort(function (n1, n2) {
                return n2 - n1
            })
            document.getElementById("output").innerHTML = arr
        }
       
           
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
