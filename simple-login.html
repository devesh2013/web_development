<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>simple login form in html</title>\
    <style>
        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            background-color: #f4f7f6;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            margin: 0;

        }

        .login-box {

            background: white;

            padding: 40px;

            border-radius: 12px;

            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);

            width: 300px;

            text-align: center;

        }

        h2 {

            margin-top: 0;

            color: #333;

        }

        .input-group {

            margin-bottom: 20px;

            position: relative;

        }

        input {

            width: 100%;

            padding: 12px;

            border: 2px solid #ddd;

            border-radius: 6px;

            box-sizing: border-box;

            font-size: 16px;

            transition: border-color 0.3s ease;

        }

        input:focus {

            outline: none;

            border-color: #5b9bd5;

        }

        button {

            width: 100%;

            padding: 12px;

            background-color: #5b9bd5;

            color: white;

            border: none;

            border-radius: 6px;

            font-size: 16px;

            cursor: pointer;

            font-weight: bold;

            transition: background-color 0.3s ease;

        }

        button:hover {

            background-color: #4a84b8;

        }

        /* --- Error Feedback Styling --- */

        .error-msg {

            color: #e74c3c;

            font-size: 12px;

            text-align: left;

            margin-top: 5px;

            display: none;
            /* Hidden by default */

        }

        /* The interesting part: A CSS Shake Animation for errors */

        .input-error {

            border-color: #e74c3c !important;

            animation: shake 0.4s ease-in-out 0s 1;

        }

        @keyframes shake {

            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-8px);
            }

            50% {
                transform: translateX(8px);
            }

            75% {
                transform: translateX(-8px);
            }

            100% {
                transform: translateX(0);
            }

        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="login-box">
        <h1>simple login form in html</h1>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="username">
                <div class="error-msg" id="usernameError">
                    username cannot be empty
                </div>
            </div>
            <div class="input-group">
                <input type="text" id="password" placeholder="password">
                <div class="error-msg" id="passwordError">
                    password must 8 characters
                </div>
            </div>
            <button type="submit">sign in</button>
        </form>
    </div>
    <script>
        const loginForm = document.getElementById("loginForm")
        const usernameInput = document.getElementById("username")
        const passwordInput = document.getElementById("password")
        const usernameError = document.getElementById("usernameError")
        const passwordError = document.getElementById("passwordError")
        loginForm.addEventListener('submit', function (event) {

            event.preventDefault();

            let isValid = true;

            resetErrors();

            if (usernameInput.value.trim() === '') {

                showError(usernameInput, usernameError);

                isValid = false;

            }

            if (passwordInput.value.length < 6) {

                showError(passwordInput, passwordError);

                isValid = false;

            }

            if (isValid) {

                alert('Success! Form is valid and ready to submit.');

                loginForm.reset();

            }

        });

        function showError(inputElement, errorElement) {

            void inputElement.offsetWidth;

            inputElement.classList.add('input-error');

            errorElement.style.display = 'block';

        }

        function resetErrors() {

            usernameInput.classList.remove('input-error');

            passwordInput.classList.remove('input-error');

            usernameError.style.display = 'none';

            passwordError.style.display = 'none';

        }
    </script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
