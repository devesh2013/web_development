<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>area calculator in javascript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>area calculator in javascript</h1>
    <script>
        function area_rectangle(){
            const length=prompt("enter the length of the rectangle")
             const breadth = prompt("enter the breadth of the rectangle")
             const area=length*breadth
             alert("area of the rectangle is " + area)
        }
         function area_square() {
                const side = prompt("enter the side of the square")
               
                const area =side * side
                alert("area of the square is " + area)
            }
        let shape=prompt("welcome to area calculator\n plese enter your choice:\n 1.rectangle\n 2.triangle\n 3.square\n 4.circle\n5.parrelogram")
        if (shape=="1"){
            area_rectangle()

        }
        else if (shape == "2") {
            area_square()

        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
