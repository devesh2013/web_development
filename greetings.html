<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>greetings in javascript</title>
</head>

<body>
    <h1>greetings in javascript</h1>
    <button type="button" onclick="greet()">get the greeting</button>
    <p id="hour"></p>
    <p id="greeting"></p>
    <script>
        function greet() {
            let greeting = ""
            let time = new Date().getHours()
            if (time < 11) {
                greeting = "morning"
            }
            else if (time < 17) {
                greeting = "afternoon"
            }
            else if (time < 20) {
                greeting = "evening"
            }
            else {
                greeting = "night"
            }
            document.getElementById("hour").innerHTML = time
            document.getElementById("greeting").innerHTML = greeting
        }
    </script>
</body>

</html>
