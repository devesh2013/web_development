<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>intro to funtions</h1>
    <label for="num1">num1</label>
    <input type="number" name="num1" id="num1">
    <label for="num2">num2</label>
    <input type="number" name="num2" id="num2">
    <button type="button" class="btn btn-primary" onclick="add()">Add</button>
    <button type="button" class="btn btn-secondary" onclick="substract()">Substract</button>
    <button type="button" class="btn btn-success" onclick="multiply()">Multiply</button>
    <button type="button" class="btn btn-danger" onclick="divide()">Divide</button>
    <p id="output"></p>
    <script>
       

        function add() {
             let num1 = Number(document.getElementById("num1").value)
            let num2 = Number(document.getElementById("num2").value)
            let sum = num1 + num2
            document.getElementById("output").innerHTML = sum
        }
        function substract(){
            let difference = num1 - num2
            document.getElementById("output").innerHTML = difference
        }
        function multiply(){
            let product = num1 * num2
            document.getElementById("output").innerHTML = product
        }
        function divide(){
            let quotiont = num1 / num2
            document.getElementById("output").innerHTML = quotiont
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
