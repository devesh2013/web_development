<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript arrow function</title>
</head>

<body>
    <h1>javascript arrow function</h1>
    <p id="output"></p>
    <script>

        const sum = (n1, n2) => {
            document.getElementById("output").innerHTML = n1 + n2
        }

        sum(6, 7)

    </script>
</body>

</html>
