<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dice in JS</title>
    <style>
        #dice {
            height: 100px;
            width: 100px;
            font-size: 5rem;
            padding: 30px;


        }

        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% {
                transform: translate(2px, 2px) rotate(0deg);
            }

            25% {
                transform: translate(-2px, -2px) rotate(-5deg);
            }

            50% {
                transform: translate(2px, -2px) rotate(5deg);
            }

            75% {
                transform: translate(-2px, 2px) rotate(0deg);
            }

            100% {
                transform: translate(2px, 2px) rotate(0deg);
            }
        }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body
    class="bg-black text-white text-center  d-flex flex-column justify-content-center align-items-center vh-100 gap-5">

    <h1>Dice in JS</h1>
    <div class="card w-25 bg-black border border-danger border-4 rounded-5 ">
        <div class="card-body d-flex flex-column justify-content-center align-items-center gap-4">
            <h3 class="text-white" id="display-text">Ready to roll?</h3>


            <div id="dice" class="bg-white d-flex flex-column justify-content-center align-items-center rounded-3   ">?
            </div>
            <button type="button" class="btn btn-light" onclick="roll()">Roll Dice</button>
            <h3 id="output-text" class="text-white"></h3>
        </div>

    </div>
    <script>
        let diceArray = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"]
        function roll() {
            const diceElement = document.getElementById("dice")
            const displayText = document.getElementById("display-text")
            const outputText = document.getElementById("output-text")
            diceElement.classList.add("shake")
            outputText.innerText = "rolling..."
            
            setTimeout(
                () => {
                    const val = Math.floor(Math.random() * 6)
                    diceElement.innerText = diceArray[val]
                    diceElement.classList.remove("shake")
                    if (val == 5) {
                        outputText.innerText = "Jackpot"
                        displayText.innerText = "Lucky"
                        outputText.classList.add("text-success")
                    }
                    else if (val == 0) {
                        outputText.innerText = " Ouch...Snake eye"
                        displayText.innerText = "Unlucky"
                        outputText.classList.add("text-danger")
                    }
                    else {
                        outputText.innerText = "u rolled a " + (val + 1)
                        displayText.innerText = "Keep Going"

                    }
                }, 600

            )
        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
