<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>stopwatch using JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>stopwatch using JS</h1>
    <div class="card">
        <div class="card-body text-center">
            <h3>Stopwatch</h3>
            <h1 class="display-3" id="display">00:00:00</h1>
            <button type="button" class="btn btn-success start" onclick="start()">Start</button>
            <button type="button" class="btn btn-danger  stop" onclick="stop()">Stop</button>
            <button type="button" class="btn btn-secondary reset" onclick="reset()">Reset</button>

        </div>
    </div>
    <script>
        let startTime
        let elapseTime = 0
        let timerInterval
        function timeToString(time) {
            let difference_hh = time / 3600000
            let hh = Math.floor(difference_hh)
            let difference_mm = (difference_hh - hh) * 60
            let mm = Math.floor(difference_mm)
            let difference_ss = (difference_mm - mm) * 60
            let ss = Math.floor(difference_ss)
            let formatedHh = hh.toString().padStart(2, "0");
            let formatedMm = mm.toString().padStart(2, "0");
            let formatedSs = ss.toString().padStart(2, "0");
            return `${formatedHh}:${formatedMm}:${formatedSs}`

        }
        function print(text) {
            document.getElementById("display").innerHTML = text
        }
        function start() {
            if (timerInterval) {
                return
            }
            startTime = Date.now() - elapseTime
            timerInterval = setInterval(
                function printTime() {
                    elapseTime = Date.now() - startTime
                    print(timeToString(elapseTime))
                }
                , 1000
            )
        }
        function stop() {
            clearInterval(timerInterval)
            timerInterval = null
        }
        function reset() {
            stop()
            elapseTime = 0
            print("00:00:00")
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
