<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>counter app in JS</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>

<body>

    <div class="card">
        <div class="card-body text-center">
            <h3>counter app</h3>
            <h1 class="display-3" id="display">0</h1>

            
            <button type="button" class="btn btn-success start" onclick="add()">Add</button>
            <button type="button" class="btn btn-danger stop" onclick="reset()">Reset</button>
        </div>
    </div>

    <script>
        
        const display = document.getElementById("display");

        function add() {
            display.innerText = Number(display.innerText) + 1;
        }

        function reset() {
            display.innerText = 0;
        }
    </script>

    <script src="https://jsdelivr.net"></script>
</body>

</html>
