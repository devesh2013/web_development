<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>area calculator in javascript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>area calculator in javascript</h1>
    <script>
        function perimeter_rectangle() {
            const length = Number(prompt("enter the length of the rectangle"))
            const breadth = Number(prompt("enter the breadth of the rectangle"))
            const perimeter = 2 * (length + breadth)
            alert("perimeter of the rectangle is " + perimeter)
        }
        function perimeter_triangle() {
            const side1 = Number(prompt("enter the side1 of the triangle"))
            const side2 = Number(prompt("enter the side2 of the triangle"))
            const side3 = Number(prompt("enter the side3 of the triangle"))
            const perimeter = side1 + side2 + side3
            alert("perimeter of the triangle is " + perimeter)
        }
        function perimeter_square() {
            const side = Number(prompt("enter the side of the square"))

            const perimeter = side * 4
            alert("perimeter of the square is " + perimeter)
        }
        function perimeter_circle() {
            const radius = Number(prompt("enter the radius of the circle"))

            const perimeter = 2 * (22 / 7)*radius
            alert("perimeter of the circle is " + perimeter)
        }
        function perimeter_parrelogram() {
            const length = Number(prompt("enter the length of the parrelogram"))
            const breadth = Number(prompt("enter the breadth of the parrelogram"))
            const perimeter = 2 * (length + breadth)
            alert("perimeter of the parrelogram is " + perimeter)
        }

        let shape = prompt("welcome to area calculator\n plese enter your choice:\n 1.rectangle\n 2.triangle\n 3.square\n 4.circle\n5.parrelogram")
        if (shape == "1") {
            perimeter_rectangle()

        }
        else if (shape == "2") {
            perimeter_triangle()

        }
        else if (shape == "3") {
            perimeter_square()

        }
        else if (shape == "4") {
            perimeter_circle()

        }
        else if (shape == "5") {
            perimeter_parrelogram()

        }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
