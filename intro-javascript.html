<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>intro to javascript </title>
</head>

<body>
    <h1>intro to javascript</h1>
    <p id="output"></p>
    <p id="output2"></p>
    <script>
        let num1 = 66
        let num2 = 67
        let sum = num1 + num2
        let difference = num1 - num2
        document.getElementById("output").innerHTML = sum
        document.getElementById("output2").innerHTML = difference

    </script>



</body>

</html>
