<!DOCTYPE html>
<html>

<body>
    <h2>JavaScript Array Methods</h2>
    <h2>project</h2>
    <p>
    </p>
    <p id="myjoin"></p>
    <p id="myfirstpop"></p>
    <p id="mysecondpop"></p>
    <script>
        var color = ["Red", "Orange", "Blue", "Yellow"];
        document.getElementById("myjoin").innerHTML = color.join(" * ");
        document.getElementById("myfirstpop").innerHTML = color;
        color.pop();
        document.getElementById("mysecondpop").innerHTML = color;
    </script>
</body>

</html>
