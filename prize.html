<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <h1>prices in html</h1>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <div class="container text-center">
        <div class="row">
            <div class="col">
                <div class="card">

                    <div class="card-body    bg-secondary-subtle text-secondary-emphasis">
                        <h5 class="card-title">Basic</h5>
                        <p class="card-text fs-4 "><b>$10</b></p>
                        <p>great for starters</p>
                        <a href="#" class="btn btn-outline-primary">sign up</a>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">

                    <div class="card-body p-3 mb-2 bg-secondary text-white">
                        <h5 class="card-title">pro</h5>
                        <p class="card-text fs-4 "><b>$30</b></p>
                        <p>best value for most</p>
                        <a href="#" class="btn btn-primary">sign up</a>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card">

                    <div class="card-body    bg-secondary-subtle text-secondary-emphasis">
                        <h5 class="card-title">enterprise</h5>
                        <p class="card-text fs-4 "><b>$99</b></p>
                        <p>for large teams</p>
                        <a href="#" class="btn btn-outline-primary">sign up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>



</body>

</html>
